name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
  
    steps:
    - uses: actions/checkout@master
    
    - name: Use Node.js
      uses: actions/setup-node@master
      with:
        node-version: "21"

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test